name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  WAILS_VERSION: v2.12.0
  NFPM_VERSION: v2.43.0

jobs:
  # Create a draft release first so a failed build never publishes a
  # half-populated release. The macOS and Linux jobs upload into it, and the
  # publish job flips it to public once both succeed.
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Create draft release
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          # 0.x releases and any tag with a pre-release suffix (e.g. -rc.1)
          # are marked as pre-releases.
          prerelease=""
          if [[ "$version" == 0.* || "$version" == *-* ]]; then
            prerelease="--prerelease"
          fi
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --draft $prerelease \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi

  macos:
    name: macOS (universal)
    needs: create-release
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install Wails
        run: |
          go install "github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Build
        env:
          CLIENT_ID: ${{ vars.OCTORADAR_CLIENT_ID }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          # Stamp the bundle's CFBundleVersion with the tag.
          tmp="$(mktemp)"
          jq --arg v "$version" '.info.productVersion = $v' wails.json > "$tmp"
          mv "$tmp" wails.json
          ldflags="-X main.version=${version} -X github.com/tnagatomi/octoradar/internal/oauth.BuildClientID=${CLIENT_ID}"
          wails build -platform darwin/universal -ldflags "$ldflags"
      - name: Sign and package as DMG
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          apps=(build/bin/*.app)
          app="${apps[0]}"
          # Ad-hoc signature: required for the universal binary to launch on
          # Apple Silicon. It is not notarized, so users still bypass
          # Gatekeeper on first launch (see README).
          codesign --deep --force -s - "$app"
          staging="$(mktemp -d)"
          cp -R "$app" "$staging"/
          ln -s /Applications "$staging"/Applications
          dmg="Octoradar-${version}-macos-universal.dmg"
          hdiutil create -volname Octoradar -srcfolder "$staging" -ov -format UDZO "$dmg"
          echo "DMG=$dmg" >> "$GITHUB_ENV"
      - name: Upload to release
        run: gh release upload "$GITHUB_REF_NAME" "$DMG" --clobber

  linux:
    name: Linux (amd64)
    needs: create-release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install Wails and nfpm
        run: |
          go install "github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}"
          go install "github.com/goreleaser/nfpm/v2/cmd/nfpm@${NFPM_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Build
        env:
          CLIENT_ID: ${{ vars.OCTORADAR_CLIENT_ID }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          ldflags="-X main.version=${version} -X github.com/tnagatomi/octoradar/internal/oauth.BuildClientID=${CLIENT_ID}"
          wails build -platform linux/amd64 -ldflags "$ldflags"
      - name: Package (.deb, .rpm, tarball)
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          VERSION="$version" nfpm package -f build/linux/nfpm.yaml -p deb -t dist
          VERSION="$version" nfpm package -f build/linux/nfpm.yaml -p rpm -t dist
          stage="octoradar-${version}-linux-amd64"
          mkdir -p "$stage"
          cp build/bin/octoradar "$stage"/
          cp build/linux/octoradar.desktop "$stage"/
          cp build/appicon.png "$stage"/octoradar.png
          cp README.md LICENSE "$stage"/
          tar -czf "${stage}.tar.gz" "$stage"
      - name: Upload to release
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          gh release upload "$GITHUB_REF_NAME" \
            dist/*.deb dist/*.rpm "octoradar-${version}-linux-amd64.tar.gz" \
            --clobber

  publish:
    name: Publish release
    needs: [macos, linux]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Publish
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
